name: validate-skills

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Lint
        run: |
          python3 -m pip install --quiet ruff
          ruff check tools tests
          ruff format --check tools tests
      - name: Check generated registry and docs
        run: python3 tools/skill_registry.py --check
      - name: Check routing evaluation
        run: |
          python3 tools/evaluate_routing.py
          python3 tools/evaluate_routing.py --check-report
      - name: Validate skills
        run: python3 tools/validate.py
      - name: Test validator
        run: python3 -m unittest discover -s tests -v
